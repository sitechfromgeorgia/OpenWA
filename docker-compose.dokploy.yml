services:
  openwa-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openwa-api
    restart: unless-stopped
    ports:
      - '2785:2785'
    environment:
      - NODE_ENV=production
      - PORT=2785
      - DATABASE_TYPE=postgres
      - DATABASE_HOST=dokploy-postgres
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=dokploy
      - DATABASE_PASSWORD=bdwjD8kPkMRXHNmS8oWhi1wwOGay59Vv
      - DATABASE_NAME=openwa
      - DATABASE_SYNCHRONIZE=true
      - ENGINE_TYPE=whatsapp-web.js
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/data/media
      - API_MASTER_KEY=${API_MASTER_KEY}
      - LOG_LEVEL=info
      - PUPPETEER_HEADLESS=true
    volumes:
      - openwa-data:/app/data
    networks:
      - openwa-network
      - dokploy-network

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.traefik
    container_name: openwa-dashboard
    restart: unless-stopped
    ports:
      - '2886:80'
    depends_on:
      - openwa-api
    networks:
      - openwa-network

volumes:
  openwa-data:

networks:
  openwa-network:
    driver: bridge
  dokploy-network:
    external: true
