services:
  openwa-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openwa-api
    restart: unless-stopped
    ports:
      - '2785:2785'
    environment:
      - NODE_ENV=production
      - PORT=2785
      - DATABASE_TYPE=postgres
      - DATABASE_HOST=dokploy-postgres
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=dokploy
      - DATABASE_PASSWORD=bdwjD8kPkMRXHNmS8oWhi1wwOGay59Vv
      - DATABASE_NAME=openwa
      - DATABASE_SYNCHRONIZE=true
      - ENGINE_TYPE=whatsapp-web.js
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/data/media
      - S3_ENDPOINT=
      - S3_ACCESS_KEY=
      - S3_SECRET_KEY=
      - REDIS_ENABLED=false
      - API_MASTER_KEY=${API_MASTER_KEY}
      - LOG_LEVEL=info
    volumes:
      - openwa-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:2785/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.traefik
    container_name: openwa-dashboard
    restart: unless-stopped
    ports:
      - '2886:80'
    depends_on:
      - openwa-api

volumes:
  openwa-data:
